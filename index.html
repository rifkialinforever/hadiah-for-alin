              setItem: function (key, val) {
                store[key] = String(val);
              },
              removeItem: function (key) {

              key: function (i) {

    <script>
      // Menggunakan Immediately Invoked Function Expression (IIFE)
      // agar variabel di sini terisolasi dan tidak bertabrakan dengan skrip eksternal
      (function () {
        // 1. Love Cursor Trail (Jejak Sentuhan Layar)
        const trailEmojis = ["💖", "✨", "🌸", "💓", "💘", "⭐"];

        function createTrailParticle(x, y) {
          try {
            const particle = document.createElement("div");
            particle.className = "trail-particle";
            particle.textContent = trailEmojis[Math.floor(Math.random() * trailEmojis.length)];
            particle.style.left = x + "px";
            particle.style.top = y + "px";

            // Ukuran acak
            const randomSize = Math.random() * 8 + 12; // 12px s.d 20px
            particle.style.fontSize = randomSize + "px";

            document.body.appendChild(particle);

            // Hapus setelah selesai animasi
            setTimeout(() => {
              particle.remove();
            }, 1000);
          } catch (err) {
            console.error("Particle creation failed safely:", err);
          }
        }

        window.addEventListener("mousemove", (e) => {
          // Buat partikel dengan persentase kemunculan agar tidak terlalu padat
          if (Math.random() < 0.15) {
            createTrailParticle(e.clientX, e.clientY);
          }
        });

        window.addEventListener("touchmove", (e) => {
          if (Math.random() < 0.25) {
            const touch = e.touches[0];
            createTrailParticle(touch.clientX, touch.clientY);
          }
        });

        // 2. Falling Hearts (Efek Hati Berjatuhan Lembut)
        const fallingEmojis = ["❤️", "💖", "🌸", "💕", "💞"];
        function createFallingHeart() {
          try {
            const heart = document.createElement("div");
            heart.className = "falling-heart";
            heart.textContent = fallingEmojis[Math.floor(Math.random() * fallingEmojis.length)];

            // Mengatur ukuran acak
            const size = Math.random() * 15 + 10; // 10px s.d 25px
            heart.style.fontSize = size + "px";

            // Mengatur posisi horizontal acak
            heart.style.left = Math.random() * 100 + "vw";

            // Mengatur kecepatan jatuh acak
            const duration = Math.random() * 5 + 5; // 5s s.d 10s
            heart.style.animationDuration = duration + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
              heart.remove();
            }, duration * 1000);
          } catch (err) {
            console.error("Falling heart creation failed safely:", err);
          }
        }

        // Meluncurkan butiran hati setiap beberapa saat sekali
        setInterval(createFallingHeart, 600);

        // 3. Canvas Celebration Engine (Confetti & Smoke)
        const canvas = document.getElementById("celebration-canvas");
        const ctx = canvas.getContext("2d");

        let particles = [];
        let animationFrameId = null;

        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        class ConfettiParticle {
          constructor(x, y, isHeart = false) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 8 + 6;
            this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            if (isHeart) {
              this.color = ["#ff7675", "#ff5252", "#fd79a8", "#e84393"][Math.floor(Math.random() * 4)];
            }
            this.speedX = Math.random() * 10 - 5;
            this.speedY = Math.random() * -15 - 5;
            this.gravity = 0.3;
            this.rotation = Math.random() * 360;
            this.rotationSpeed = Math.random() * 10 - 5;
            this.isHeart = isHeart;
            this.opacity = 1;
          }

          update() {
            this.speedY += this.gravity;
            this.x += this.speedX;
            this.y += this.speedY;
            this.rotation += this.rotationSpeed;
            if (this.y > canvas.height) {
              this.opacity -= 0.02;
            }
          }

          draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate((this.rotation * Math.PI) / 180);
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = "currentColor";
            ctx.fillStyle = this.color;

            if (this.isHeart) {
              ctx.beginPath();
              ctx.moveTo(0, 0);
              ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, 0, 0, this.size);
              ctx.bezierCurveTo(this.size, 0, this.size / 2, -this.size / 2, 0, 0);
              ctx.fill();
            } else {
              ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
            }
            ctx.restore();
          }
        }

        class SmokeParticle {
          constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3 + 2;
            this.speedX = Math.random() * 1 - 0.5;
            this.speedY = Math.random() * -2 - 1;
            this.opacity = 0.8;
            this.growth = 0.4;
          }

          update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.size += this.growth;
            this.opacity -= 0.015;
          }

          draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = "rgba(220, 220, 220, 0.6)";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        function triggerConfettiBlast() {
          const x = canvas.width / 2;
          const y = canvas.height * 0.6; // Meledak dari posisi tengah kue lilin
          for (let i = 0; i < 120; i++) {
            particles.push(new ConfettiParticle(x, y, Math.random() > 0.4));
          }
          if (!animationFrameId) {
            loop();
          }
        }

        function triggerSmoke() {
          const x = canvas.width / 2;
          const y = canvas.height * 0.5; // Mengarah di lilin atas
          for (let i = 0; i < 30; i++) {
            setTimeout(() => {
              particles.push(new SmokeParticle(x + (Math.random() * 10 - 5), y));
            }, i * 30);
          }
          if (!animationFrameId) {
            loop();
          }
        }

        function loop() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles = particles.filter((p) => p.opacity > 0 && p.size > 0);

          particles.forEach((p) => {
            p.update();
            p.draw();
          });

          if (particles.length > 0) {
            animationFrameId = requestAnimationFrame(loop);
          } else {
            animationFrameId = null;
          }
        }

        // 4. Interactive Floating Balloons Engine
        let balloonInterval = null;

        function startBalloons() {
          if (balloonInterval) return;
          balloonInterval = setInterval(() => {
            const balloonColors = [
              "rgba(255, 118, 117, 0.85)", // Coral pink
              "rgba(253, 121, 168, 0.85)", // Lavender pink
              "rgba(232, 67, 147, 0.85)", // Deep pink
              "rgba(214, 48, 49, 0.85)", // Love red
            ];
            const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];

            const balloon = document.createElement("div");
            balloon.className = "floating-balloon";

            const startLeft = Math.random() * 90 + "vw";
            const endLeft = Math.random() * 90 + "vw";
            const endRotation = Math.random() * 40 - 20 + "deg";

            balloon.style.setProperty("--start-left", startLeft);
            balloon.style.setProperty("--end-left", endLeft);
            balloon.style.setProperty("--end-rotation", endRotation);
            balloon.style.color = color;

            // Random size
            const scale = Math.random() * 0.3 + 0.85; // 0.85 to 1.15
            balloon.style.transform = `scale(${scale})`;

            // SVG Heart Balloon
            balloon.innerHTML = `
            <svg viewBox="0 0 32 40" width="55" height="70">
              <defs>
                <radialGradient id="balloonGrad" cx="30%" cy="30%" r="70%">
                  <stop offset="0%" stop-color="#fff" stop-opacity="0.5"/>
                  <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
                </radialGradient>
              </defs>
              <path fill="currentColor" d="M16,28.2 C16,28.2 31,18 31,9.5 C31,4.5 27,0.5 22,0.5 C18.5,0.5 16.5,2.5 16,3.5 C15.5,2.5 13.5,0.5 10,0.5 C5,0.5 1,4.5 1,9.5 C1,18 16,28.2 16,28.2 Z"/>
              <path fill="url(#balloonGrad)" d="M16,28.2 C16,28.2 31,18 31,9.5 C31,4.5 27,0.5 22,0.5 C18.5,0.5 16.5,2.5 16,3.5 C15.5,2.5 13.5,0.5 10,0.5 C5,0.5 1,4.5 1,9.5 C1,18 16,28.2 16,28.2 Z"/>
              <!-- Knot at bottom -->
              <polygon fill="currentColor" points="16,27 13,31 19,31" />
              <!-- Balloon string -->
              <path stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" d="M16,30 Q20,35 14,40 T18,50" />
            </svg>
          `;

            // Letuskan saat diklik / disentuh
            balloon.addEventListener("click", (e) => {
              e.stopPropagation();
              popBalloon(balloon);
            });
            balloon.addEventListener("touchstart", (e) => {
              e.stopPropagation();
              popBalloon(balloon);
            });

            document.body.appendChild(balloon);

            // Hapus balon yang lepas melewati langit
            setTimeout(() => {
              balloon.remove();
            }, 11000);
          }, 1500);
        }

        function stopBalloons() {
          if (balloonInterval) {
            clearInterval(balloonInterval);
            balloonInterval = null;
          }
        }

        function popBalloon(balloon) {
          // Efek letusan
          const rect = balloon.getBoundingClientRect();
          const x = rect.left + rect.width / 2;
          const y = rect.top + rect.height / 2;

          // Picu percikan konfeti kecil di koordinat balon
          for (let i = 0; i < 15; i++) {
            const p = new ConfettiParticle(x, y, true);
            p.speedX = Math.random() * 6 - 3;
            p.speedY = Math.random() * 6 - 3;
            p.gravity = 0.1;
            p.size = Math.random() * 5 + 3;
            particles.push(p);
          }
          if (!animationFrameId) {
            loop();
          }

          // Animasi meletus cepat
          balloon.style.transform = "scale(0)";
          balloon.style.opacity = "0";
          setTimeout(() => {
            balloon.remove();
          }, 200);
        }

        // 5. Safe Method Interception (Menghubungkan Animasi Custom dengan Script Bawaan)
        const originalTiupLilin = window.tiupLilin;
        window.tiupLilin = function () {
          // Jalankan program tiup lilin utama
          if (typeof originalTiupLilin === "function") {
            originalTiupLilin();
          } else {
            // Fallback jika lilin gagal mati dari script luar
            const api = document.getElementById("apiLilin");
            if (api) api.style.display = "none";
          }

          // Picu Asap Lilin & Ledakan Confetti Romantis!
          triggerSmoke();
          setTimeout(triggerConfettiBlast, 200);
        };

        const originalPindahHal = window.pindahHal;
        window.pindahHal = function (num) {
          if (typeof originalPindahHal === "function") {
            originalPindahHal(num);
          }

          // Nyalakan balon terbang di Hal 3 (Make a Wish) & Hal 4 (Surat Terakhir)
          if (num === 3 || num === 4) {
            startBalloons();
          } else {
            stopBalloons();
          }

          // Rayakan dengan ledakan konfeti jika berhasil menyelesaikan puzzle (pindah ke Hal 3)
          if (num === 3) {
            setTimeout(triggerConfettiBlast, 400);
          }
        };
      })();
    </script>

    <script src="https://htmlku.com/prod/kado/script.js"></script>
